<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="docFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#glow)"/>

  <!-- Document shape (center) -->
  <g transform="translate(256, 248)">
    <!-- Document body -->
    <path d="M-40,-64 L16,-64 L40,-40 L40,64 L-40,64 Z" fill="url(#docFill)" opacity="0.92"/>
    <!-- Document fold -->
    <path d="M16,-64 L16,-40 L40,-40 Z" fill="#c7d2fe" opacity="0.8"/>
    <!-- Document lines -->
    <line x1="-24" y1="-28" x2="24" y2="-28" stroke="#818cf8" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-24" y1="-8" x2="20" y2="-8" stroke="#818cf8" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-24" y1="12" x2="16" y2="12" stroke="#818cf8" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Conversion arrows (cycle around the document) -->
  <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Top-right arrow (clockwise, curving right and down) -->
    <path d="M300,148 A120,120 0 0,1 364,312"/>
    <!-- Arrowhead for top-right -->
    <polygon fill="#ffffff" stroke="none" points="364,312 344,284 380,290" opacity="0.95"/>

    <!-- Bottom-left arrow (clockwise, curving left and up) -->
    <path d="M212,364 A120,120 0 0,1 148,200"/>
    <!-- Arrowhead for bottom-left -->
    <polygon fill="#ffffff" stroke="none" points="148,200 168,228 132,222" opacity="0.95"/>
  </g>
</svg>